apiVersion: v1
kind: Pod
metadata:
  name: pod-con-pvc
  namespace: dev
  labels:
    app: pod-con-pvc
spec:
  containers:
    - name: nginx
      image: nginx
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      volumeMounts:
        - mountPath: "/usr/share/nginx/html"
          name: html
  volumes:
    - name: html
      persistentVolumeClaim:
        claimName: local-pvc
