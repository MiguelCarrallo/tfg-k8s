apiVersion: v1
kind: Pod
metadata:
  name: servidor-a
  namespace: dev
  labels:
    app: servidor-a
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 80
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
