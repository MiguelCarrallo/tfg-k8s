apiVersion: v1
kind: Service
metadata:
  name: nginx-lb
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-subnets: subnet-0c523928dcb0f9cd2,subnet-054e7d6c20d801d67
  labels:
    app: nginx
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

