apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin-pre
  namespace: pre
rules:
- apiGroups: [""]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-pre-binding
  namespace: pre
subjects:
- kind: User
  name: tfg-user
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: admin-pre
  apiGroup: rbac.authorization.k8s.io
